version: '3.8'

services:
  # Dedicated MySQL database for Backend E2E tests
  mysql-backend-e2e:
    image: mysql:8.0
    container_name: memoriaali-backend-e2e-db
    environment:
      MYSQL_ROOT_PASSWORD: backend_e2e_root_password_123
      MYSQL_DATABASE: memoriaali_backend_e2e
      MYSQL_USER: memoriaali_backend_e2e_user
      MYSQL_PASSWORD: backend_e2e_user_password_123
    ports:
      - '33060:3306' # Non-conflicting port (dev uses 3306)
    volumes:
      - mysql_backend_e2e_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - backend-e2e-network

  # Backend API container for E2E testing
  backend-e2e:
    build:
      context: ../ # Build from apps/backend context
      dockerfile: Dockerfile
    container_name: memoriaali-backend-e2e-api
    environment:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: mysql://memoriaali_backend_e2e_user:backend_e2e_user_password_123@mysql-backend-e2e:3306/memoriaali_backend_e2e
      JWT_SECRET: backend_e2e_jwt_secret_key_for_testing_only_min_32_chars
      JWT_EXPIRES_IN: 24h
    ports:
      - '8001:4000' # Non-conflicting port (dev uses 3000)
    depends_on:
      mysql-backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/v2/health']
      timeout: 10s
      retries: 5
      interval: 10s
    networks:
      - backend-e2e-network
    volumes:
      - ../../../packages/database/schema.prisma:/app/prisma/schema.prisma
      - ../../../packages/database/migrations:/app/prisma/migrations

volumes:
  mysql_backend_e2e_data:
    driver: local

networks:
  backend-e2e-network:
    driver: bridge
